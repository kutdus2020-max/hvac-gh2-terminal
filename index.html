        const FILTER_INTERVAL = 7;
        const PRESSURE_INTERVAL = 3;
        let data = [];
        const tableBody = document.getElementById('tableBody');

        window.onload = () => {
            if (localStorage.getItem('hvac_theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').className = 'fas fa-sun text-amber-400';
            }
            
            const saved = localStorage.getItem('hvac_v7_8_autoboot');
            
            // Если таблица пустая или мы открыли ее впервые — АВТОМАТИЧЕСКИ загружаем базу
            if (saved && JSON.parse(saved).length > 0) {
                data = JSON.parse(saved);
            } else {
                data = getDefaultData();
                save(); // Сразу сохраняем
            }
            
            render();
        };

        function save() { localStorage.setItem('hvac_v7_8_autoboot', JSON.stringify(data)); }

        function resetToDefault() {
            if(confirm("Сбросить таблицу к исходному списку с завода? Все ваши текущие замеры будут удалены!")) {
                data = getDefaultData();
                save(); 
                render();
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('hvac_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            document.getElementById('themeIcon').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun text-amber-400' : 'fas fa-moon text-slate-600';
        }

        function getDaysDiff(dateString) {
            if(!dateString) return 0;
            const lastDate = new Date(dateString);
            const today = new Date();
            const diffTime = today - lastDate;
            return Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        }

        function getTempColor(t) {
            if(t < 18) return 'text-blue-500 bg-blue-50 dark:bg-blue-900/20'; 
            if(t >= 18 && t <= 23) return 'text-emerald-500 bg-emerald-50 dark:bg-emerald-900/20'; 
            if(t > 23 && t <= 25) return 'text-amber-500 bg-amber-50 dark:bg-amber-900/20'; 
            return 'text-red-500 bg-red-50 dark:bg-red-900/20 font-black'; 
        }

        function render(fData = data) {
            tableBody.innerHTML = '';
            let al = 0, runCount = 0, oduTotal = 0, iduTotal = 0, oduRun = 0, iduRun = 0, dueTotal = 0;
            
            fData.forEach((item, i) => {
                const isIDU = item.type === 'IDU';
                if (isIDU) iduTotal++; else oduTotal++;
                
                const days = getDaysDiff(item.date);
                const filterDue = isIDU && days >= FILTER_INTERVAL;
                const pressureDue = !isIDU && days >= PRESSURE_INTERVAL;
                if (filterDue || pressureDue) dueTotal++;

                const tempVal = parseInt(item.temp);
                const isDirty = item.filter === 'Dirty';
                const isAl = item.alarm === 'Alarm' || (isIDU && tempVal > 25) || item.motor === 'Error' || item.power === 'Phase Loss';
                if (isAl) al++; 
                if (item.motor !== 'Off' && item.motor !== 'Error') {
                    runCount++;
                    if (isIDU) iduRun++; else oduRun++;
                }

                const tr = document.createElement('tr');
                tr.className = `group transition-all ${(filterDue || pressureDue) ? 'animate-pulse-red' : ''} ${isAl ? 'bg-red-50/50 dark:bg-red-900/10' : 'hover:bg-slate-50 dark:hover:bg-slate-700/30'} ${(item.motor==='Off'&&item.power==='Off') ? 'opacity-50' : ''}`;

                let motorOptions = isIDU 
                    ? `<option value="High Fan" ${item.motor==='High Fan'?'selected':''}>Fan: High</option>
                       <option value="Med Fan" ${item.motor==='Med Fan'?'selected':''}>Fan: Med</option>
                       <option value="Low Fan" ${item.motor==='Low Fan'?'selected':''}>Fan: Low</option>
                       <option value="Off" ${item.motor==='Off'?'selected':''}>Off</option>
                       <option value="Error" ${item.motor==='Error'?'selected':''}>Error</option>`
                    : `<option value="Running" ${item.motor==='Running'?'selected':''}>Comp: Run</option>
                       <option value="Standby" ${item.motor==='Standby'?'selected':''}>Comp: Stdby</option>
                       <option value="Defrost" ${item.motor==='Defrost'?'selected':''}>Defrost</option>
                       <option value="Off" ${item.motor==='Off'?'selected':''}>Off</option>
                       <option value="Error" ${item.motor==='Error'?'selected':''}>Error</option>`;

                tr.innerHTML = `
                    <td class="px-4 py-4"><input type="date" value="${item.date}" oninput="u(${i},'date',this.value)" class="bg-transparent border-none text-[10px] font-black outline-none ${ (filterDue || pressureDue) ? 'text-red-500' : 'text-slate-500 dark:text-slate-400'} dark:[color-scheme:dark]"></td>
                    <td class="px-4 py-4"><div class="font-mono font-black text-sm ${isAl?'text-red-600 dark:text-red-400':'text-blue-600 dark:text-blue-400'} leading-tight">${item.kks}</div><button onclick="toggleType(${i})" class="text-[9px] font-bold uppercase tracking-widest mt-1 px-2 py-0.5 rounded ${isIDU?'bg-indigo-100 text-indigo-600':'bg-slate-200 text-slate-600'}">${item.type}</button></td>
                    <td class="px-4 py-4"><input list="area-options" value="${item.area}" oninput="u(${i},'area',this.value)" class="w-full bg-transparent border-none p-1 text-[10px] font-black uppercase text-slate-600 dark:text-slate-300 outline-none"></td>
                    <td class="px-2 py-4 text-center">${isIDU ? `<span class="text-slate-300 dark:text-slate-600 italic text-[10px]">N/A</span>` : `<input type="number" value="${item.press}" oninput="u(${i},'press',this.value)" class="w-14 text-center bg-white dark:bg-slate-900 border rounded p-1 text-xs font-bold ${pressureDue?'border-red-500 text-red-600':'border-slate-200 dark:border-slate-700 dark:text-white'}">`}</td>
                    <td class="px-2 py-4 text-center relative">${!isIDU ? `<span class="text-slate-300 dark:text-slate-600 italic text-[10px]">N/A</span>` : `<input type="number" value="${item.temp}" oninput="u(${i},'temp',this.value)" class="w-14 text-center border rounded p-1 text-xs font-bold ${(item.motor!=='Off'&&item.power!=='Off')?getTempColor(tempVal):'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700'}">${item.filter==='Dirty'?`<i class="fas fa-exclamation-triangle absolute -top-1 right-0 text-amber-500 text-[8px]" title="Dirty Filter"></i>`:''}`}</td>
                    <td class="px-4 py-4 text-center border-l border-slate-50 dark:border-slate-700/50"><select onchange="u(${i},'motor',this.value)" class="bg-transparent text-[10px] font-black uppercase outline-none ${item.motor==='Error'?'text-red-600':'text-blue-500'}">${motorOptions}</select></td>
                    <td class="px-4 py-4 text-center"><select onchange="u(${i},'power',this.value)" class="bg-transparent text-[10px] font-black uppercase outline-none ${item.power==='Off'?'text-slate-400':item.power!=='Normal'?'text-orange-600':'text-slate-500'}"><option value="Normal" ${item.power==='Normal'?'selected':''}>OK</option><option value="Off" ${item.power==='Off'?'selected':''}>Off</option><option value="Phase Loss" ${item.power==='Phase Loss'?'selected':''}>Phase Loss</option><option value="Low Volt" ${item.power==='Low Volt'?'selected':''}>Low Volt</option></select></td>
                    <td class="px-4 py-4 text-center border-l border-slate-50 dark:border-slate-700/50"><select onchange="u(${i},'filter',this.value)" class="bg-transparent text-[10px] font-black uppercase outline-none ${item.filter==='Dirty'?'text-amber-500':'text-slate-500'}"><option value="Clean" ${item.filter==='Clean'?'selected':''}>Clean</option><option value="Dirty" ${item.filter==='Dirty'?'selected':''}>Dirty</option></select>${filterDue?'<div class="text-[8px] text-red-600 font-black mt-1">ОСМОТР!</div>':''}</td>
                    <td class="px-4 py-4 text-center"><button onclick="u(${i},'date','${new Date().toISOString().split('T')[0]}')" class="w-8 h-8 rounded-full transition-all ${(filterDue || pressureDue) ? 'bg-orange-500 text-white animate-bounce shadow-lg shadow-orange-500/50' : 'bg-slate-100 text-slate-300 dark:bg-slate-700 dark:text-slate-500'}"><i class="fas fa-check"></i></button></td>
                    <td class="px-4 py-4 text-center"><button onclick="t(${i})" class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${isAl ? 'bg-red-500 text-white shadow-lg' : 'bg-emerald-100 text-emerald-700'}">${isAl ? 'Alarm' : 'Normal'}</button></td>
                    <td class="px-4 py-4 text-right"><button onclick="data.splice(${i},1);save();render()" class="text-slate-300 dark:text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-times"></i></button></td>
                `;
                tableBody.appendChild(tr);
            });
            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statTotalSplit').innerText = `ODU: ${oduTotal} | IDU: ${iduTotal}`;
            document.getElementById('statComp').innerText = runCount;
            document.getElementById('statRunSplit').innerText = `ODU: ${oduRun} | IDU: ${iduRun}`;
            document.getElementById('statDue').innerText = dueTotal;
            const badge = document.getElementById('alertBadge');
            if(dueTotal > 0) { badge.classList.remove('hidden'); document.getElementById('alertCount').innerText = dueTotal; } else { badge.classList.add('hidden'); }
        }

        function u(i, f, v) { data[i][f] = v; save(); render(); }
        function t(i) { data[i].alarm = data[i].alarm === 'Normal' ? 'Alarm' : 'Normal'; save(); render(); }
        function toggleType(i) { data[i].type = data[i].type === 'ODU' ? 'IDU' : 'ODU'; data[i].motor = data[i].type === 'IDU' ? 'High Fan' : 'Running'; save(); render(); }

        // ИМПОРТ ТОЛЬКО ДЛЯ РЕЗЕРВНЫХ КОПИЙ
        document.getElementById('csvFile').onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                skipEmptyLines: 'greedy',
                complete: res => {
                    try {
                        const rows = res.data;
                        const headerText = JSON.stringify(rows.slice(0, 3)).toLowerCase();
                        if (headerText.includes("power") || headerText.includes("motor")) {
                            const validRows = rows.slice(2).filter(r => r.length > 5);
                            data = validRows.map(r => ({
                                date: r[0] || new Date().toISOString().split('T')[0], kks: r[1] || 'Unknown', type: r[2] || 'ODU', area: r[3] || '',
                                press: parseInt(r[4]) || 0, temp: parseInt(r[5]) || 0, motor: r[6] || 'Running', power: r[7] || 'Normal',
                                filter: r[8] || 'Clean', alarm: r[9] || 'Normal'
                            }));
                            save(); render(); alert(`Резервная копия загружена: ${data.length} блоков.`);
                        } else {
                            alert("Этот файл не похож на резервную копию (экспорт). Импорт отменен.");
                        }
                    } catch (error) { alert("Ошибка импорта файла."); }
                    document.getElementById('csvFile').value = ""; 
                }
            });
        };
        
        function exportCSV() {
            const rows = [["UKS GH2 Master Report"], ["Date", "KKS", "Type", "Area", "Press", "Temp", "Motor", "Power", "Filter", "Status"], ...data.map(i => [i.date, i.kks, i.type, i.area, i.press, i.temp, i.motor, i.power, i.filter, i.alarm])];
            const blob = new Blob(["\ufeff" + Papa.unparse(rows)], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `HVAC_v7.8.csv`; a.click();
        }

        document.getElementById('search').oninput = e => {
            const q = e.target.value.toLowerCase();
            render(data.filter(x => x.kks.toLowerCase().includes(q) || x.area.toLowerCase().includes(q)));
        };

        function copyTelegramReport() {
            const dueTotal = document.getElementById('statDue').innerText;
            const alarms = data.filter(i => i.alarm === 'Alarm' || (i.type === 'IDU' && parseInt(i.temp) > 25) || i.motor === 'Error' || (i.power !== 'Normal' && i.power !== 'Off')).map(i => `${i.kks} [${i.area}]`);
            let text = `⚡ *UKS GH2 HVAC REPORT*\n📅 ${new Date().toLocaleDateString()}\n\n🔹 Всего блоков: ${data.length}\n🔹 В работе: ${document.getElementById('statComp').innerText}\n🔹 Требуют осмотра (ТО): ${dueTotal}\n`;
            if(alarms.length > 0) text += `\n🚨 *АВАРИИ:* \n${alarms.join('\n')}\n`;
            else text += `\n✅ Аварий нет.\n`;
            navigator.clipboard.writeText(text).then(() => alert("Отчет скопирован!"));
        }
    </script>
</body>
</html>
