        function getLocalYMD() {
            const d = new Date();
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        }

        // 🔥 ЖЕЛЕЗНЫЙ ФИЛЬТР ДАТЫ: Исправляет баг Google с длинными датами
        function getSafeDate(val) {
            if (!val) return getLocalYMD();
            let str = String(val).trim();
            if (str.includes('T')) {
                try {
                    let d = new Date(str);
                    let offset = d.getTimezoneOffset() * 60000;
                    return new Date(d.getTime() - offset).toISOString().split('T')[0];
                } catch(e) { return getLocalYMD(); }
            }
            return str.substring(0, 10);
        }

        async function sync() {
            if (isSyncLocked) return;
            const statusEl = document.getElementById('cloudStatus');
            if (CLOUD_URL.includes("ВСТАВЬ")) return;

            try {
                const response = await fetch(CLOUD_URL);
                const raw = await response.json();
                const filtered = raw.filter(item => item && item.kks && String(item.kks).toUpperCase().includes('XAA'));
                
                if (filtered.length > 0) {
                    data = filtered;
                    statusEl.innerHTML = '<i class="fas fa-check-circle mr-1"></i> ONLINE / SYNC OK';
                    statusEl.className = "text-[9px] font-bold uppercase text-emerald-600 bg-emerald-100 px-2 py-1 rounded shadow-sm inline-block mt-1";
                } else {
                    statusEl.innerHTML = '🟡 ПУСТАЯ БАЗА / INIT...';
                    data = getDefaultData();
                    await save(true);
                }
                render();
            } catch (e) {
                statusEl.innerHTML = '🔴 ОШИБКА СЕТИ';
                if (data.length === 0) data = getDefaultData();
                render();
            }
        }

        async function save(isInit = false) {
            if (CLOUD_URL.includes("ВСТАВЬ")) return;
            isSyncLocked = true; 
            const statusEl = document.getElementById('cloudStatus');
            statusEl.innerHTML = '<i class="fas fa-cloud-upload-alt mr-1"></i> СОХРАНЕНИЕ...';
            
            try {
                await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                setTimeout(() => { isSyncLocked = false; sync(); }, 3000);
            } catch (e) { isSyncLocked = false; }
        }

        function render(fData = data) {
            tableBody.innerHTML = '';
            let run = 0; let due = 0;

            fData.forEach((item, i) => {
                const isIDU = item.type === 'IDU';
                const safeDateVal = getSafeDate(item.date); // 🔥 Переводим дату из Google в нормальную
                const days = Math.floor((new Date(getLocalYMD()) - new Date(safeDateVal))/(1000*60*60*24));
                const isDue = (isIDU && days >= 7) || (!isIDU && days >= 3);
                
                if (isDue) due++;
                if (item.comp === 'Running' || item.comp === 'Standby') run++;
                
                const tr = document.createElement('tr');
                tr.className = `border-b dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all ${isDue ? 'animate-pulse-red bg-red-50/30' : ''}`;
                
                tr.innerHTML = `
                    <td class="px-4 py-4"><input type="date" value="${safeDateVal}" onchange="u(${i},'date',this.value)" class="bg-transparent text-[10px] font-black outline-none dark:text-slate-300 dark:[color-scheme:dark]"></td>
                    <td class="px-4 py-4"><div class="font-mono font-black text-sm text-blue-700 dark:text-blue-400">${item.kks}</div><div class="text-[9px] opacity-50 uppercase font-bold">${item.type}</div></td>
                    <td class="px-4 py-4"><input value="${item.area || ''}" onchange="u(${i},'area',this.value)" class="bg-transparent text-[10px] font-black w-full outline-none uppercase text-slate-500"></td>
                    <td class="px-2 py-4 text-center">${isIDU ? '-' : `<input type="number" step="0.1" value="${item.press || 0}" onchange="u(${i},'press',this.value)" class="w-14 bg-white dark:bg-slate-900 border rounded text-center text-xs font-bold py-1">`}</td>
                    <td class="px-2 py-4 text-center">${!isIDU ? '-' : `<input type="number" value="${item.temp || 0}" onchange="u(${i},'temp',this.value)" class="w-14 bg-white dark:bg-slate-900 border rounded text-center text-xs font-bold py-1 ${item.temp>25?'text-red-500':''}">`}</td>
                    <td class="px-4 py-4 text-center">
                        <select onchange="u(${i},'comp',this.value)" class="bg-transparent text-[10px] font-black uppercase outline-none cursor-pointer ${item.comp === 'Error' ? 'text-red-500' : item.comp === 'Standby' ? 'text-amber-500' : 'text-emerald-600'}">
                            <option value="Running" ${item.comp=='Running'?'selected':''}>Running</option>
                            <option value="Standby" ${item.comp=='Standby'?'selected':''}>Standby</option>
                            <option value="Off" ${item.comp=='Off'?'selected':''}>Off</option>
                            <option value="Error" ${item.comp=='Error'?'selected':''}>Error</option>
                        </select>
                    </td>
                    <td class="px-4 py-4 text-center"><select onchange="u(${i},'power',this.value)" class="bg-transparent text-[10px] font-black uppercase outline-none"><option value="Normal" ${item.power=='Normal'?'selected':''}>Normal</option><option value="Off" ${item.power=='Off'?'selected':''}>Off</option></select></td>
                    <td class="px-4 py-4 text-center"><select onchange="u(${i},'filter',this.value)" class="bg-transparent text-[10px] font-black uppercase outline-none"><option value="Clean" ${item.filter=='Clean'?'selected':''}>Clean</option><option value="Dirty" ${item.filter=='Dirty'?'selected':''}>Dirty</option></select></td>
                    <td class="px-4 py-4 text-center"><button onclick="u(${i},'date','${getLocalYMD()}')" class="w-8 h-8 rounded-full ${isDue?'bg-orange-500 text-white shadow-lg':'bg-slate-100 dark:bg-slate-800 text-slate-400'}"><i class="fas fa-check text-[10px]"></i></button></td>
                    <td class="px-4 py-4 text-center"><button onclick="t(${i})" class="text-[9px] font-black uppercase px-3 py-1 rounded-full ${item.alarm=='Alarm'?'bg-red-500 text-white':'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30'}">${item.alarm}</button></td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statComp').innerText = run;
            document.getElementById('statDue').innerText = due;
        }

        function u(i, f, v) { data[i][f] = v; render(); save(); }
        function t(i) { data[i].alarm = data[i].alarm == 'Normal' ? 'Alarm' : 'Normal'; render(); save(); }
        function resetToDefault() { if(confirm("Сбросить базу?")) { data = getDefaultData(); save(true); render(); } }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function exportCSV() { const b = new Blob(["\ufeff" + Papa.unparse(data)], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "HVAC_UKS2_Report.csv"; a.click(); }
        function copyTelegramReport() { navigator.clipboard.writeText(`⚡ HVAC UKS2 HYDROGEN REPORT: ${getLocalYMD()}\n🔹 Units: ${data.length}\n🔹 Running: ${document.getElementById('statComp').innerText}\n🔹 Maintenance Due: ${document.getElementById('statDue').innerText}`).then(()=>alert("Отчет скопирован!")); }
        
        window.onload = () => {
            sync();
            setInterval(sync, 60000); 
        };

        document.getElementById('search').oninput = e => render(data.filter(x => x.kks.toLowerCase().includes(e.target.value.toLowerCase()) || x.area.toLowerCase().includes(e.target.value.toLowerCase())));
    </script>
</body>
</html>
